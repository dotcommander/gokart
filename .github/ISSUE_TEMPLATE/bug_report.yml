name: Bug report
description: Report reproducible incorrect behavior in GoKart.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: For security issues, use the private reporting link in SECURITY.md.
  - type: input
    id: version
    attributes:
      label: GoKart version
      placeholder: v0.13.0
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go version and platform
      placeholder: go1.26.3 darwin/arm64
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest commands or code that reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include relevant output with secrets removed.
